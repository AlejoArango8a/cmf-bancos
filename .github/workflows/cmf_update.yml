# .github/workflows/cmf_update.yml
# Se ejecuta automáticamente el día 20 de cada mes (la CMF publica ~días 15-18)
# También se puede ejecutar manualmente desde GitHub

name: Actualizar datos CMF

on:
  schedule:
    # Día 20 de cada mes a las 9:00 AM UTC (6:00 AM Chile)
    - cron: '0 9 20 * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Modo de carga'
        required: true
        default: 'incremental'
        type: choice
        options:
          - incremental   # Solo meses nuevos (uso normal mensual)
          - latest        # Solo el mes más reciente
          - full          # Todos los meses desde 2023 (carga inicial)

jobs:
  load-cmf-data:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar carga de datos
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          MODE="${{ github.event.inputs.mode || 'incremental' }}"
          echo "Ejecutando en modo: $MODE"
          python cmf_loader.py $MODE

      - name: Notificar resultado
        if: always()
        run: |
          if [ ${{ job.status }} == 'success' ]; then
            echo "✓ Carga completada exitosamente"
          else
            echo "✗ Error en la carga — revisar logs"
          fi
